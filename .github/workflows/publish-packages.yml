name: Publish Packages
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tramiflow'
      - run: npm ci
      - run: npx turbo run typecheck --filter=@tramiflow/core --filter=@tramiflow/database --filter=@tramiflow/ui --filter=@tramiflow/pdf-kit
      - run: npm publish --workspace=packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm publish --workspace=packages/database
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm publish --workspace=packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm publish --workspace=packages/pdf-kit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
